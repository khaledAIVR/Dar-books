# Render Blueprint for GitHub repo: Dar-books (https://github.com/khaledAIVR/Dar-books)
#
# The Laravel + Nuxt app lives in the waha-darin/ SUBDIRECTORY (not at the repo root).
# Keep rootDir: waha-darin so Docker build context and Dockerfile path are correct.
# In the Render UI: connect repo Dar-books, Root Directory = waha-darin, Dockerfile path = ./Dockerfile
#
# Set secrets in the Render dashboard (never commit real keys):
#   APP_KEY, JWT_SECRET, DATABASE_URL, BREVO_API_KEY
# See waha-darin/docs/DEPLOY_PREVIEW.md for the full variable list.

services:
  - type: web
    name: dar-books
    runtime: docker
    rootDir: waha-darin
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_NAME
        value: Dar Books
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: RUN_MIGRATIONS_ON_BOOT
        value: "true"
      - key: SKIP_EMAIL_VERIFICATION
        value: "false"
      - key: MAIL_MAILER
        value: brevo
      - key: MAIL_FROM_ADDRESS
        value: mohammad.khaled.moslemany@gmail.com
      - key: MAIL_FROM_NAME
        value: Dar Books
      # BREVO_API_KEY → set as secret in Render dashboard
      - key: DB_CONNECTION
        value: pgsql
