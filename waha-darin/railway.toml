# Railway: deploy this directory as a Docker service (see Dockerfile).
# If your Git repo root is the parent folder (e.g. Dar-books), set
# "Root Directory" to `waha-darin` in the Railway service settings.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Apache entrypoint reads $PORT from Railway
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Persistent uploads + Passport keys: attach a Railway volume at /var/www/html/storage
# (see docs/DEPLOY_PREVIEW.md). If Apache cannot write the volume, set on the service:
# RAILWAY_RUN_UID=0
